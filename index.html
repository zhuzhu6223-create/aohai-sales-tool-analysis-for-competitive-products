<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>遨海科技 · 销售竞品知识闯关</title>
<style>
:root {
  --navy: #0A2342;
  --navy2: #1a3a5c;
  --ocean: #1D9E75;
  --ocean2: #22B585;
  --bg: #F5F7FA;
  --white: #FFFFFF;
  --text: #1A2533;
  --muted: #6B7A8D;
  --err: #E53E3E;
  --ok: #38A169;
  --warn: #D69E2E;
  --border: #E2E8F0;
  --shadow: 0 2px 12px rgba(10,35,66,.10);
  --r: 12px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* ── HEADER ── */
.hdr{background:var(--navy);color:#fff;padding:14px 16px;text-align:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3);}
.logo{font-size:20px;font-weight:800;letter-spacing:3px;}
.logo em{color:var(--ocean);font-style:normal;}
.tagline{font-size:11px;opacity:.6;margin-top:2px;letter-spacing:1px;}

/* ── CONTAINER ── */
.wrap{max-width:720px;margin:0 auto;padding:0 16px 80px;}

/* ── SCREENS ── */
.screen{display:none;}
.screen.on{display:block;}

/* ── HOME ── */
.hero{background:linear-gradient(135deg,var(--navy) 0%,var(--navy2) 100%);color:#fff;padding:28px 20px 24px;text-align:center;margin:-0px;}
.hero h1{font-size:22px;margin-bottom:8px;}
.hero p{font-size:13px;opacity:.75;line-height:1.7;}

.lv-card{background:#fff;border-radius:var(--r);padding:20px;margin:16px 0;box-shadow:var(--shadow);cursor:pointer;transition:transform .2s,box-shadow .2s;position:relative;overflow:hidden;border-left:4px solid var(--border);}
.lv-card:hover:not(.locked){transform:translateY(-2px);box-shadow:0 6px 20px rgba(10,35,66,.14);}
.lv-card.locked{opacity:.55;cursor:not-allowed;pointer-events:none;}
.lv-card.unlocked{border-left-color:var(--ocean);}
.lv-card.done{border-left-color:var(--ok);}
.lv-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.lv-name{font-size:16px;font-weight:700;color:var(--navy);}
.lv-num{font-size:11px;color:var(--muted);margin-bottom:3px;letter-spacing:.5px;}
.pill{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600;white-space:nowrap;}
.pill-lock{background:#eef0f3;color:var(--muted);}
.pill-go{background:#e6f7f2;color:var(--ocean);}
.pill-done{background:#f0fff4;color:var(--ok);}
.lv-desc{font-size:13px;color:var(--muted);margin-bottom:12px;line-height:1.55;}
.lv-meta{display:flex;flex-wrap:wrap;gap:12px;font-size:12px;color:var(--muted);}
.lv-score-big{font-size:22px;font-weight:800;color:var(--ok);}
.lv-action{margin-top:14px;}
.lock-msg{margin-top:14px;padding:10px;background:#f6f6f6;border-radius:8px;text-align:center;color:var(--muted);font-size:13px;}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 20px;border-radius:9px;font-size:15px;font-weight:600;cursor:pointer;border:none;width:100%;transition:all .2s;font-family:inherit;}
.btn-p{background:var(--ocean);color:#fff;}
.btn-p:hover{background:var(--ocean2);}
.btn-s{background:#fff;color:var(--navy);border:2px solid var(--border);}
.btn-s:hover{border-color:var(--ocean);color:var(--ocean);}
.btn-row{display:flex;flex-direction:column;gap:12px;margin-top:20px;}

/* ── QUIZ HEADER ── */
.qhdr{background:var(--navy);color:#fff;padding:14px 16px 12px;}
.qhdr-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;margin-bottom:6px;}
.prog-bar{background:rgba(255,255,255,.2);height:6px;border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;background:var(--ocean);border-radius:3px;transition:width .35s ease;}
.timer{font-variant-numeric:tabular-nums;font-weight:600;letter-spacing:1px;}

/* ── QUESTION CARD ── */
.qcard{background:#fff;border-radius:var(--r);padding:22px;margin:18px 0;box-shadow:var(--shadow);}
.qnum{font-size:11px;color:var(--ocean);font-weight:700;margin-bottom:10px;text-transform:uppercase;letter-spacing:1px;}
.qtext{font-size:16px;font-weight:700;color:var(--navy);line-height:1.65;margin-bottom:20px;}
.opts{display:flex;flex-direction:column;gap:11px;}

.opt{display:flex;align-items:flex-start;gap:12px;padding:13px 15px;border-radius:10px;border:2px solid var(--border);cursor:pointer;transition:all .18s;background:#fff;}
.opt:hover:not(.dis){border-color:var(--ocean);background:#f0fff9;}
.opt.correct{border-color:var(--ok);background:#f0fff4;}
.opt.wrong{border-color:var(--err);background:#fff5f5;}
.opt.dis{cursor:default;}
.opt-lt{width:28px;height:28px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:var(--muted);flex-shrink:0;transition:all .18s;}
.opt.correct .opt-lt{background:var(--ok);color:#fff;}
.opt.wrong .opt-lt{background:var(--err);color:#fff;}
.opt-txt{font-size:14px;line-height:1.55;padding-top:3px;}

.expl{margin-top:18px;padding:15px;background:#EEF6FF;border-radius:10px;border-left:4px solid #3182CE;display:none;}
.expl.show{display:block;}
.expl-title{font-size:11px;font-weight:700;color:#3182CE;margin-bottom:7px;text-transform:uppercase;letter-spacing:1px;}
.expl-body{font-size:13px;color:var(--text);line-height:1.75;}

.next-wrap{margin-top:18px;display:none;}

/* ── RESULTS ── */
.res-hero{padding:32px 0 20px;text-align:center;}
.score-ring{width:120px;height:120px;border-radius:50%;margin:0 auto 18px;display:flex;align-items:center;justify-content:center;position:relative;--sp:0%;}
.score-ring::before{content:'';position:absolute;inset:0;border-radius:50%;background:conic-gradient(var(--ocean) var(--sp),var(--border) 0);}
.score-inner{position:relative;z-index:1;width:96px;height:96px;border-radius:50%;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.snum{font-size:34px;font-weight:800;color:var(--navy);line-height:1;}
.stot{font-size:12px;color:var(--muted);}
.res-title{font-size:21px;font-weight:700;color:var(--navy);margin-bottom:6px;}
.res-sub{font-size:13px;color:var(--muted);margin-bottom:22px;}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:4px;}
.stat-box{background:#fff;border-radius:10px;padding:14px;text-align:center;box-shadow:var(--shadow);}
.stat-v{font-size:20px;font-weight:700;color:var(--navy);margin-bottom:3px;}
.stat-l{font-size:11px;color:var(--muted);}

/* ── WRONG REVIEW ── */
.review{margin-top:24px;}
.review-title{font-size:15px;font-weight:700;color:var(--navy);margin-bottom:14px;}
.ritem{background:#fff;border-radius:10px;padding:15px;margin-bottom:12px;box-shadow:var(--shadow);border-left:4px solid var(--err);}
.rq{font-size:13px;font-weight:600;color:var(--navy);margin-bottom:7px;line-height:1.5;}
.ra{font-size:12px;color:var(--ok);margin-bottom:5px;}
.re{font-size:12px;color:var(--muted);line-height:1.65;}

/* ── BADGE ── */
.badge-wrap{padding:32px 0;}
.badge-box{background:#fff;border-radius:20px;padding:28px;margin-bottom:20px;box-shadow:var(--shadow);text-align:center;}
.badge-box h2{font-size:18px;color:var(--navy);margin-bottom:16px;}
.ni-group{margin-bottom:18px;text-align:left;}
.ni-label{display:block;font-size:12px;color:var(--muted);margin-bottom:7px;}
.ni{width:100%;padding:11px 14px;border:2px solid var(--border);border-radius:8px;font-size:16px;text-align:center;outline:none;color:var(--navy);font-family:inherit;}
.ni:focus{border-color:var(--ocean);}
.svg-wrap{max-width:260px;margin:0 auto 14px;}
.svg-wrap svg{width:100%;height:auto;}
.save-hint{font-size:11px;color:var(--muted);}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--navy);color:#fff;padding:11px 22px;border-radius:8px;font-size:13px;transition:transform .3s;z-index:500;white-space:nowrap;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}

/* ── CONFETTI ── */
@keyframes cf{0%{transform:translateY(-60px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
.cf{position:fixed;top:-20px;animation:cf linear forwards;z-index:999;pointer-events:none;border-radius:2px;}

/* ── POP ── */
@keyframes pop{0%{transform:scale(0);opacity:0}70%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
.pop{animation:pop .45s cubic-bezier(.34,1.56,.64,1) forwards;}

/* ── STUDY MODE ── */
.study-hdr{background:var(--navy);color:#fff;padding:13px 16px;}
.study-hdr-inner{display:flex;justify-content:space-between;align-items:center;font-size:13px;}
.back-btn{background:none;border:none;color:rgba(255,255,255,.7);font-size:14px;cursor:pointer;padding:4px 0;font-family:inherit;}
.back-btn:hover{color:#fff;}
.study-progress{font-size:12px;opacity:.7;}
.study-item{background:#fff;border-radius:var(--r);padding:18px;margin:14px 0;box-shadow:var(--shadow);}
.study-qnum{font-size:10px;color:var(--ocean);font-weight:700;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px;}
.study-q{font-size:15px;font-weight:700;color:var(--navy);line-height:1.6;margin-bottom:14px;}
.study-opts{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;}
.study-opt{display:flex;gap:10px;padding:10px 12px;border-radius:8px;border:1.5px solid var(--border);font-size:13px;line-height:1.5;align-items:flex-start;}
.study-opt.right{border-color:var(--ok);background:#f0fff4;}
.study-opt-lt{font-weight:700;min-width:20px;color:var(--muted);flex-shrink:0;padding-top:1px;}
.study-opt.right .study-opt-lt{color:var(--ok);}
.study-expl{padding:12px 14px;background:#EEF6FF;border-radius:8px;border-left:3px solid #3182CE;}
.study-expl-title{font-size:10px;font-weight:700;color:#3182CE;margin-bottom:5px;text-transform:uppercase;letter-spacing:1px;}
.study-expl-body{font-size:12px;color:var(--text);line-height:1.75;}
.study-footer{padding:8px 0 4px;}

/* ── CTX TAG ── */
.ctx-tag{display:inline-block;padding:3px 10px;border-radius:5px;font-size:11px;font-weight:700;background:#FFF3CD;color:#7d5a00;margin-bottom:10px;letter-spacing:.3px;border:1px solid #ffe083;}
.study-ctx{display:inline-block;padding:2px 9px;border-radius:4px;font-size:10px;font-weight:700;background:#FFF3CD;color:#7d5a00;margin-bottom:8px;border:1px solid #ffe083;}

/* ── HOME two-button row ── */
.lv-btn-row{display:flex;gap:10px;margin-top:14px;}
.btn-half{flex:1;padding:11px 10px;font-size:14px;}

/* ── MOBILE ── */
@media(max-width:480px){
  .qtext{font-size:15px;}
  .opt-txt{font-size:13px;}
  .snum{font-size:30px;}
  .stats{gap:8px;}
  .stat-v{font-size:18px;}
}
</style>
</head>
<body>

<div class="hdr">
  <div class="logo">遨<em>海</em>科技</div>
  <div class="tagline">AOHAI · 销售竞品知识闯关系统</div>
</div>

<div class="wrap">

  <!-- ════════════ HOME ════════════ -->
  <div id="s-home" class="screen on">
    <div class="hero">
      <h1>竞品知识速训</h1>
      <p>先学习知识点，再闯关测试，掌握产品卖点、竞品差异与销售话术<br>通过全部三关，获得「认证销售」徽章</p>
    </div>
    <div id="home-grid"></div>
  </div>

  <!-- ════════════ QUIZ ════════════ -->
  <div id="s-quiz" class="screen">
    <div class="qhdr">
      <div class="qhdr-row">
        <span id="q-lv-label">第一关：产品能力</span>
        <span class="timer" id="q-timer">00:00</span>
      </div>
      <div class="qhdr-row" style="margin-bottom:8px;">
        <span id="q-prog-txt">题目 1 / 10</span>
        <span id="q-score-txt">得分 0</span>
      </div>
      <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
    </div>
    <div class="qcard">
      <div class="qnum" id="q-num">第 1 题</div>
      <div class="ctx-tag" id="q-ctx" style="display:none"></div>
      <div class="qtext" id="q-text"></div>
      <div class="opts" id="opts"></div>
      <div class="expl" id="expl">
        <div class="expl-title">解析 · 销售话术</div>
        <div class="expl-body" id="expl-body"></div>
      </div>
    </div>
    <div class="next-wrap" id="next-wrap">
      <button class="btn btn-p" id="next-btn" onclick="nextQ()">下一题 →</button>
    </div>
  </div>

  <!-- ════════════ RESULTS ════════════ -->
  <div id="s-res" class="screen">
    <div class="res-hero">
      <div class="score-ring" id="score-ring">
        <div class="score-inner">
          <div class="snum" id="r-score">0</div>
          <div class="stot">/ 10</div>
        </div>
      </div>
      <div class="res-title" id="r-title">本关完成！</div>
      <div class="res-sub" id="r-sub"></div>
    </div>
    <div class="stats">
      <div class="stat-box"><div class="stat-v" id="s-correct">0</div><div class="stat-l">答对题数</div></div>
      <div class="stat-box"><div class="stat-v" id="s-time">0:00</div><div class="stat-l">用时</div></div>
      <div class="stat-box"><div class="stat-v" id="s-rate">0%</div><div class="stat-l">正确率</div></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-p" id="r-next-btn" onclick="onNextLevel()" style="display:none">解锁下一关 →</button>
      <button class="btn btn-s" onclick="retryLevel()">重练本关</button>
      <button class="btn btn-s" onclick="goHome()">返回主页</button>
    </div>
    <div class="review" id="review-sec" style="display:none">
      <div class="review-title">❌ 错题回顾</div>
      <div id="wrong-list"></div>
    </div>
  </div>

  <!-- ════════════ STUDY ════════════ -->
  <div id="s-study" class="screen">
    <div class="study-hdr">
      <div class="study-hdr-inner">
        <button class="back-btn" onclick="goHome()">← 返回主页</button>
        <span id="study-lv-label">第一关知识点</span>
        <span class="study-progress" id="study-count">15个知识点</span>
      </div>
    </div>
    <div id="study-list"></div>
    <div class="study-footer">
      <button class="btn btn-p" id="study-go-btn" onclick="startLevelFromStudy()">已学完，去闯关 →</button>
    </div>
  </div>

  <!-- ════════════ BADGE ════════════ -->
  <div id="s-badge" class="screen">
    <div class="badge-wrap">
      <div class="badge-box">
        <h2>🏆 恭喜获得认证徽章！</h2>
        <div class="ni-group">
          <label class="ni-label">输入您的姓名，生成专属认证徽章</label>
          <input class="ni" id="badge-name" type="text" placeholder="请输入姓名" maxlength="10" oninput="refreshBadge()">
        </div>
        <div class="svg-wrap" id="svg-wrap"></div>
        <p class="save-hint">截图保存，长按图片分享</p>
      </div>
      <div class="btn-row">
        <button class="btn btn-p" onclick="goHome()">返回主页</button>
      </div>
    </div>
  </div>

</div><!-- /wrap -->

<div class="toast" id="toast"></div>

<script>
/* ════════════════════════════════════════════
   QUESTION BANK
   ════════════════════════════════════════════ */
const QB = {
1:[
  {q:"遨海 AT-B20 VDES 基站通过了哪项国际权威认证？",
   o:["美国 FCC 型式认证","德国 BSH（联邦海事水文局）型式认证","英国 MCA 认证","中国 CCS 船级社认证"],a:1,
   e:"AT-B20 已通过德国 BSH 型式认证，这是国产 VDES 设备极为稀缺的国际权威背书。话术：「我们是国内极少数拿到德国 BSH 认证的 VDES 设备厂商，这是国际海事领域最权威的型式认证之一，Saab/Kongsberg 同级别认证，国产设备仅我们具备。」"},
  {q:"AT-B20 支持最多多少个虚拟航标（AtoN）？",
   o:["16个","32个","48个","≥80个"],a:3,
   e:"AT-B20 支持虚拟航标 ≥80 个，并支持 MSI 海上安全信息播发。上海翊臻仅支持 48 个。话术：「同是国产 VDES 基站，我们能设置的虚拟航标数量是翊臻的 1.67 倍，对复杂航道标识改造项目尤为关键。」"},
  {q:"遨海 AT-B20 的 AIS/ASM 接收灵敏度是多少？",
   o:["优于 -112 dBm","优于 -115 dBm","优于 -118 dBm","优于 -120 dBm"],a:2,
   e:"遨海 -118 dBm 优于翊臻 -112 dBm 约 6 dB，与 Saab/Kongsberg 持平。6 dB 意味着远海弱信号环境接收能力显著更强。话术：「同等功率下，我们比国内竞品多覆盖约 40% 的弱信号区域，远海盲区接收更可靠。」"},
  {q:"AT-B20 的最高通信速率（VDE 信道）是多少？",
   o:["19.2 kbps","57.6 kbps","153.6 kbps","307.2 kbps"],a:3,
   e:"VDE 信道最高速率 307.2 kbps，是传统 AIS（9.6 kbps）的 32 倍，支持图像、视频等大数据量海上通信。这是 VDES 相对 AIS 的核心跃升，是遨海产品核心卖点之一。"},
  {q:"AT-B10AS 单收站基于什么技术？主要用于什么场景？",
   o:["专用 ASIC 芯片，用于大型港口","软件无线电 SDR，用于轻量化 AIS 接收覆盖","FPGA 处理器，用于军事监控","云计算架构，用于远洋船队管理"],a:1,
   e:"AT-B10AS 基于软件无线电 SDR，支持断网存储补传，适合低成本感知覆盖场景。相比「普通 AIS + 摄像头」替代方案，它是专业设备且灵敏度更高（>-115 dBm），不可同类比较。"},
  {q:"遨海产品线中，哪款产品支持卫星 VDES（VDE-SAT）双向收发？",
   o:["AT-B20 VDES 基站","AT-B10AE AIS 增强基站","AT-S30 VDES 卫星载荷","海域监管数智平台"],a:2,
   e:"AT-S30 是遨海的卫星载荷产品，支持 LAIS/AIS/ASM 接收 + VDE-SAT 双向收发，上行速率 4.2～134.4 kbps。注意：目前处于在轨试验阶段，尚未商业运营，对客户须如实说明。"},
  {q:"遨海 AT-B20 采用哪些调制方式？（选最完整的答案）",
   o:["仅 GMSK","GMSK 和 π/4QPSK","GMSK、π/4QPSK、16QAM","OFDM 和 16QAM"],a:2,
   e:"三种调制方式覆盖 VDE 高阶调制（16QAM），这是实现 307.2 kbps 高速率的关键。16QAM 代表设备已真正支持 VDE 高速信道，而非仅挂名支持——是硬核技术指标。"},
  {q:"AT-B20 的供电方式有哪些？",
   o:["仅 AC 220V","仅 DC 12-36V","AC 220V 和 DC 12-36V 双电源自动切换","需要外接 UPS 才能双路供电"],a:2,
   e:"双电源自动切换是重要可靠性指标，适合海上恶劣环境部署。对比 Kongsberg（需选配），遨海供电冗余度开箱即有，无需额外采购。话术：「出厂即双路冗余，无需另购 UPS。」"},
  {q:"海域监管数智平台能融合哪些数据源？",
   o:["仅 AIS 和雷达","AIS、雷达、VHF、CCTV、水文气象、标准水上要素","仅 AIS 和 CCTV","只支持遨海自有设备数据"],a:1,

3:[
  {q:"客户（海警）问「VDES 现在是强制要求吗？」最准确的回答是？",
   o:["是的，IMO 已全球强制，必须尽快升级","2028年为自愿配备节点非强制，但AIS信道拥塞、无法双向高速传输数据的通信瓶颈现在就是真实痛点","不是，您等2030年再考虑","中国已单独立法强制，不装要罚款"],a:1,
   e:"「VDES 即将全球强制」是竞品分析明确列出的「禁止使用」话术红线。关键纠错：VDES 与 AIS 同为 VHF 频段，通信距离基本相同，VDES 的核心价值是信道扩容（307.2 kbps vs AIS 9.6 kbps）和双向数据通信，而非覆盖更远。正确话术：「2028节点临近，但客户现在就面临 AIS 信道拥塞、无法向船只下达指令/传输文件的瓶颈，这些痛点不需要等强制令就能立项。」"},
  {q:"客户已有中船鹏力 VTS 平台，质疑为什么还需要遨海，最佳应对思路是？",
   o:["正面攻击鹏力平台能力不足，说服客户换掉","降价，争取做硬件配套供应商","定位「专业能力分包方」——VDES 远海通信能力嵌入鹏力平台，补盲区不替换平台","告诉客户遨海总包能力更强"],a:2,

  {q:"客户问「你们案例不多，凭什么说你们稳定可靠？」最好的回应策略是？",

/* ════════════════════════════════════════════
   CONFIG
   ════════════════════════════════════════════ */
const PASS = {1:7, 2:7, 3:8};
const LV_NAME = {1:'第一关：产品能力', 2:'第二关：竞品认知', 3:'第三关：销售实战'};
const KEYS = (l) => ({best:`aohai_quiz_level${l}_best`, unlocked:`aohai_quiz_level${l}_unlocked`, attempts:`aohai_quiz_level${l}_attempts`});

/* ════════════════════════════════════════════
   STATE
   ════════════════════════════════════════════ */
let QS = {level:1, qs:[], idx:0, score:0, wrong:[], start:0, tid:null};

/* ════════════════════════════════════════════
   STORAGE
   ════════════════════════════════════════════ */
const get = k => { try { return JSON.parse(localStorage.getItem(k)); } catch(e){ return null; } };
const set = (k,v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e){} };

function lvState(l) {
  return {
    best: get(KEYS(l).best) || 0,
    unlocked: l===1 ? true : (get(KEYS(l).unlocked) || false),
    attempts: get(KEYS(l).attempts) || 0
  };
}
function isPassed(l){ return lvState(l).best >= PASS[l]; }

/* ════════════════════════════════════════════
   SHUFFLE (Fisher-Yates)
   ════════════════════════════════════════════ */
function shuffle(a){ const r=[...a]; for(let i=r.length-1;i>0;i--){const j=0|Math.random()*(i+1);[r[i],r[j]]=[r[j],r[i]];} return r; }
function pick(l){ return shuffle(QB[l]).slice(0,10); }

/* ════════════════════════════════════════════
   SCREENS
   ════════════════════════════════════════════ */
function show(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));
  document.getElementById('s-'+id).classList.add('on');
  window.scrollTo(0,0);
  if(id==='home') renderHome();
}
function goHome(){ show('home'); }

/* ════════════════════════════════════════════
   HOME
   ════════════════════════════════════════════ */
function renderHome(){
  const cfg = [
    {id:1, icon:'📡', desc:'掌握遨海产品线核心参数与技术优势'},
    {id:2, icon:'🔍', desc:'了解主要竞品差距与市场竞争格局'},
    {id:3, icon:'💬', desc:'销售场景话术演练与应对策略实战'}
  ];
  document.getElementById('home-grid').innerHTML = cfg.map(c=>{
    const s = lvState(c.id);
    const passed = s.best >= PASS[c.id];
    const locked = !s.unlocked;
    const pillCls = locked?'pill-lock':(passed?'pill-done':'pill-go');
    const pillTxt = locked?'🔒 未解锁':(passed?`✓ 已通关 ${s.best}/10`:'进行中');
    const cardCls = locked?'locked':(passed?'done':'unlocked');
    const action = locked
      ? `<div class="lock-msg">通过第 ${c.id-1} 关后解锁</div>`
      : `<div class="lv-btn-row">
           <button class="btn btn-s btn-half" onclick="startStudy(${c.id})" style="pointer-events:auto">📖 先学习</button>
           <button class="btn btn-p btn-half" onclick="startLevel(${c.id})" style="pointer-events:auto">${passed?'再次闯关 →':'开始闯关 →'}</button>
         </div>`;
    const scoreHtml = passed
      ? `<div style="margin-top:8px"><span class="lv-score-big">${s.best}</span><span style="font-size:13px;color:var(--muted)"> / 10 历史最高</span></div>` : '';
    return `<div class="lv-card ${cardCls}">
      <div class="lv-row">
        <div><div class="lv-num">第 ${c.id} 关</div><div class="lv-name">${c.icon} ${LV_NAME[c.id].split('：')[1]}</div></div>
        <span class="pill ${pillCls}">${pillTxt}</span>
      </div>
      <div class="lv-desc">${c.desc}</div>
      <div class="lv-meta">
        <span>📝 10题 / 15题库随机</span>
        <span>🎯 ≥${PASS[c.id]}题通过</span>
        ${s.attempts>0?`<span>🔁 已练 ${s.attempts} 次</span>`:''}
      </div>
      ${scoreHtml}
      ${action}
    </div>`;
  }).join('');
}

/* ════════════════════════════════════════════
   START LEVEL
   ════════════════════════════════════════════ */
function startLevel(l){
  const s = lvState(l);
  if(!s.unlocked){ toast('请先通过前一关！'); return; }
  set(KEYS(l).attempts, s.attempts+1);
  QS = {level:l, qs:pick(l), idx:0, score:0, wrong:[], start:Date.now(), tid:null};
  document.getElementById('q-lv-label').textContent = LV_NAME[l];
  show('quiz');
  startTimer();
  renderQ();
}

/* ════════════════════════════════════════════
   TIMER
   ════════════════════════════════════════════ */
function startTimer(){
  if(QS.tid) clearInterval(QS.tid);
  QS.tid = setInterval(()=>{
    const e = 0|(Date.now()-QS.start)/1000;
    document.getElementById('q-timer').textContent =
      `${String(0|e/60).padStart(2,'0')}:${String(e%60).padStart(2,'0')}`;
  },1000);
}
function stopTimer(){ clearInterval(QS.tid); }

/* ════════════════════════════════════════════
   RENDER QUESTION
   ════════════════════════════════════════════ */
const LTRS = ['A','B','C','D'];
function renderQ(){
  const q = QS.qs[QS.idx];
  const n = QS.idx+1, tot = QS.qs.length;
  document.getElementById('q-num').textContent = `第 ${n} 题 · ${LV_NAME[QS.level].split('：')[1]}`;
  const ctxEl = document.getElementById('q-ctx');
  if(q.ctx){ ctxEl.textContent = q.ctx; ctxEl.style.display='inline-block'; }
  else { ctxEl.style.display='none'; }
  document.getElementById('q-text').textContent = q.q;
  document.getElementById('prog-fill').style.width = `${((n-1)/tot)*100}%`;
  document.getElementById('q-prog-txt').textContent = `题目 ${n} / ${tot}`;
  document.getElementById('q-score-txt').textContent = `得分 ${QS.score}`;
  document.getElementById('opts').innerHTML = q.o.map((t,i)=>
    `<div class="opt" id="op${i}" onclick="pick_ans(${i})">
       <div class="opt-lt" id="ol${i}">${LTRS[i]}</div>
       <div class="opt-txt">${t}</div>
     </div>`).join('');
  document.getElementById('expl').classList.remove('show');
  document.getElementById('next-wrap').style.display='none';
}

/* ════════════════════════════════════════════
   PICK ANSWER
   ════════════════════════════════════════════ */
function pick_ans(sel){
  const q = QS.qs[QS.idx];
  const cor = q.a;
  document.querySelectorAll('.opt').forEach(o=>o.classList.add('dis'));
  if(sel===cor){
    document.getElementById('op'+sel).classList.add('correct');
    document.getElementById('ol'+sel).textContent='✓';
    QS.score++;
  } else {
    document.getElementById('op'+sel).classList.add('wrong');
    document.getElementById('ol'+sel).textContent='✗';
    document.getElementById('op'+cor).classList.add('correct');
    document.getElementById('ol'+cor).textContent='✓';
    QS.wrong.push(q);
  }
  document.getElementById('expl-body').textContent = q.e;
  document.getElementById('expl').classList.add('show');
  document.getElementById('q-score-txt').textContent = `得分 ${QS.score}`;
  const isLast = QS.idx === QS.qs.length-1;
  document.getElementById('next-btn').textContent = isLast ? '查看结果 →' : '下一题 →';
  const nw = document.getElementById('next-wrap');
  nw.style.display='block';
  setTimeout(()=>nw.scrollIntoView({behavior:'smooth',block:'nearest'}),120);
}

/* ════════════════════════════════════════════
   NEXT QUESTION
   ════════════════════════════════════════════ */
function nextQ(){
  QS.idx++;
  if(QS.idx>=QS.qs.length){ stopTimer(); showResults(); }
  else { renderQ(); window.scrollTo(0,0); }
}

/* ════════════════════════════════════════════
   RESULTS
   ════════════════════════════════════════════ */
function showResults(){
  const {level,score,wrong,start} = QS;
  const el = 0|(Date.now()-start)/1000;
  const tot = QS.qs.length;
  const passed = score>=PASS[level];
  const prevBest = lvState(level).best;
  if(score>prevBest) set(KEYS(level).best, score);
  if(passed && level<3) set(KEYS(level+1).unlocked, true);

  const pct = score/tot;
  document.getElementById('score-ring').style.setProperty('--sp', (pct*100)+'%');
  document.getElementById('r-score').textContent = score;
  document.getElementById('s-correct').textContent = score;
  document.getElementById('s-time').textContent =
    `${String(0|el/60).padStart(2,'0')}:${String(el%60).padStart(2,'0')}`;
  document.getElementById('s-rate').textContent = Math.round(pct*100)+'%';

  if(passed){
    document.getElementById('r-title').textContent =
      level===3 ? '🏆 全部三关通关！认证达成' : '本关通过！';
    document.getElementById('r-sub').textContent =
      level===3 ? `答对 ${score} 题，成绩优秀，获得认证销售徽章！`
                : `答对 ${score} 题，已解锁下一关！`;
  } else {
    document.getElementById('r-title').textContent = '本次未通过，继续加油！';
    document.getElementById('r-sub').textContent = `答对 ${score} 题，需 ${PASS[level]} 题通过，可重练本关。`;
  }

  const nb = document.getElementById('r-next-btn');
  if(passed && level<3){
    nb.textContent = `前往第 ${level+1} 关 →`; nb.style.display='';
  } else if(passed && level===3){
    nb.textContent = '查看认证徽章 →'; nb.style.display='';
  } else {
    nb.style.display='none';
  }

  const rev = document.getElementById('review-sec');
  if(wrong.length>0){
    rev.style.display='block';
    document.getElementById('wrong-list').innerHTML = wrong.map(q=>`
      <div class="ritem">
        <div class="rq">${q.q}</div>
        <div class="ra">✓ 正确答案：${LTRS[q.a]}. ${q.o[q.a]}</div>
        <div class="re">${q.e}</div>
      </div>`).join('');
  } else {
    rev.style.display='none';
  }

  show('res');
  if(passed) confetti();
}

function onNextLevel(){
  const {level,score}=QS;
  if(score>=PASS[level] && level===3) showBadge();
  else if(score>=PASS[level]) startLevel(level+1);
}
function retryLevel(){ startLevel(QS.level); }

/* ════════════════════════════════════════════
   CONFETTI
   ════════════════════════════════════════════ */
function confetti(){
  const cols=['#1D9E75','#F6C90E','#E53E3E','#ffffff','#3182CE'];
  for(let i=0;i<70;i++) setTimeout(()=>{
    const el=document.createElement('div');
    el.className='cf';
    el.style.cssText=`left:${Math.random()*100}vw;width:${6+Math.random()*7}px;height:${6+Math.random()*7}px;background:${cols[0|Math.random()*cols.length]};border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${2+Math.random()*2}s;animation-delay:${Math.random()*.4}s;`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),4500);
  },i*25);
}

/* ════════════════════════════════════════════
   TOAST
   ════════════════════════════════════════════ */
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2600);
}

/* ════════════════════════════════════════════

   ════════════════════════════════════════════ */
let studyLevel = 1;

function startStudy(l) {
  studyLevel = l;
  document.getElementById('study-lv-label').textContent = LV_NAME[l];
  document.getElementById('study-count').textContent = `${QB[l].length} 个知识点`;

  document.getElementById('study-list').innerHTML = QB[l].map((q, i) => `
    <div class="study-item">
      <div class="study-qnum">知识点 ${i+1} · ${LV_NAME[l].split('：')[1]}</div>
      ${q.ctx ? `<div class="study-ctx">${q.ctx}</div>` : ''}
      <div class="study-q">${q.q}</div>
      <div class="study-opts">
        ${q.o.map((opt, oi) => `
          <div class="study-opt ${oi===q.a?'right':''}">
            <span class="study-opt-lt">${oi===q.a?'✓':LTRS[oi]}</span>
            <span>${opt}</span>
          </div>`).join('')}
      </div>
      <div class="study-expl">
        <div class="study-expl-title">解析 · 销售话术</div>
        <div class="study-expl-body">${q.e}</div>
      </div>
    </div>`).join('');

  const btn = document.getElementById('study-go-btn');
  btn.textContent = isPassed(l) ? `再次闯关第 ${l} 关 →` : `已学完，去闯关 →`;
  show('study');
}

function startLevelFromStudy() { startLevel(studyLevel); }

/* ════════════════════════════════════════════
   INIT
   ════════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', ()=>{ show('home'); });
</script>
</body>
